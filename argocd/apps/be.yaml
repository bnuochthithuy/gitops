apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: be
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/bnuochthithuy/gitops.git
    path: k8s/be
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
