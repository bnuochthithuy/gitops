apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: api-email-alerts
  namespace: monitoring
  labels:
    alertmanagerConfig: api
spec:
  route:
    receiver: api-email
    groupBy: ["alertname", "namespace"]
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 1h
    matchers:
      - name: team
        value: api
        matchType: "="

  receivers:
    - name: api-email
      emailConfigs:
        - to: "bnuochthithuy13032005@gmail.com"           # ← thay email của bạn
          from: "bnuochthithuy13032005@gmail.com"          # ← thay email của bạn
          smarthost: "smtp.gmail.com:587"
          authUsername: "bnuochthithuy13032005@gmail.com"  # ← thay email của bạn
          authPassword:
            name: alertmanager-api-email
            key: smtp_password
          requireTLS: true
          headers:
            Subject: "[API ALERT] {{ .GroupLabels.alertname }} - {{ .Status | toUpper }}"
          html: |
            <h2>🚨 API SLO Alert</h2>
            {{ range .Alerts }}
            <hr>
            <b>Alert:</b> {{ .Labels.alertname }}<br>
            <b>Severity:</b> {{ .Labels.severity }}<br>
            <b>Status:</b> {{ .Status }}<br>
            <b>Summary:</b> {{ .Annotations.summary }}<br>
            <b>Description:</b> {{ .Annotations.description }}<br>
            <b>Started:</b> {{ .StartsAt }}<br>
            {{ end }}
