apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: api-slo
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: api-slo-recording
      interval: 30s
      rules:
        - record: api:http_request_success_rate:5m
          expr: |
            sum(rate(flask_http_request_total{namespace="demo", status!~"5.."}[5m]))
            /
            sum(rate(flask_http_request_total{namespace="demo"}[5m]))

        - record: api:slo_error_budget_remaining
          expr: |
            1 - (
              (1 - api:http_request_success_rate:5m)
              / (1 - 0.99)
            )

    - name: api-slo-alerts
      rules:
        - alert: ApiEmailTest
          expr: vector(1)
          for: 0s
          labels:
            namespace: demo
            severity: page
            service: api
            team: api
          annotations:
            summary: "API email test alert"
            description: "Temporary alert to verify Alertmanager email delivery."

        - alert: ApiSLOBreach
          expr: |
            sum(rate(flask_http_request_total{namespace="demo", status=~"5.."}[5m]))
            /
            sum(rate(flask_http_request_total{namespace="demo"}[5m]))
            > 0.01
          for: 5m
          labels:
            namespace: demo
            severity: critical
            service: api
            team: api
          annotations:
            summary: "API SLO breach"
            description: |
              Current error rate {{ $value | humanizePercentage }} is above the 1% SLO threshold.
              Availability is below 99%.
            runbook_url: "https://github.com/bnuochthithuy/gitops/blob/main/k8s-api/README.md"

        - alert: ApiSLOErrorBudgetLow
          expr: api:slo_error_budget_remaining < 0.5
          for: 2m
          labels:
            namespace: demo
            severity: warning
            service: api
            team: api
          annotations:
            summary: "API error budget below 50%"
            description: |
              Error budget remaining is {{ $value | humanizePercentage }}.
              Check the API before the 99% SLO is breached.
