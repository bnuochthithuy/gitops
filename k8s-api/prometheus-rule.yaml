apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: api-slo-alerts
  namespace: monitoring
spec:
  groups:
  - name: api-slo
    rules:
    - alert: ApiHighErrorRate
      expr: sum(rate(flask_http_request_total{namespace="demo",status=~"5.."}[1m])) > 0.1
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "API high error rate"
        description: "API 5xx error rate is above SLO threshold"