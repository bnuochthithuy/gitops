apiVersion: v1
kind: ConfigMap
metadata:
  name: fe-html
  namespace: demo
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>GitOps Full Stack App</title>
        <style>
            body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; color: white; }
            .card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.3); text-align: center; max-width: 500px; }
            h1 { margin-top: 0; font-size: 2.5rem; }
            .btn { background: #ff4757; color: white; border: none; padding: 15px 30px; font-size: 1.2rem; border-radius: 30px; cursor: pointer; transition: transform 0.2s, background 0.2s; margin-top: 20px; }
            .btn:hover { background: #ff6b81; transform: scale(1.05); }
            #response { margin-top: 30px; padding: 20px; background: rgba(0,0,0,0.2); border-radius: 10px; font-family: monospace; font-size: 1.1rem; min-height: 50px; display: none; }
            .loader { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto; display: none; }
            @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>Frontend App 🚀</h1>
            <p>Welcome to our GitOps deployed Frontend application. Click the button below to fetch live data from the Backend API.</p>
            <button class="btn" onclick="fetchData()">Fetch Data from Backend</button>
            <div class="loader" id="loader"></div>
            <div id="response"></div>
        </div>

        <script>
            function fetchData() {
                document.getElementById('loader').style.display = 'block';
                document.getElementById('response').style.display = 'none';
                
                fetch('/api/data.json')
                    .then(res => res.json())
                    .then(data => {
                        setTimeout(() => {
                            document.getElementById('loader').style.display = 'none';
                            const resDiv = document.getElementById('response');
                            resDiv.style.display = 'block';
                            resDiv.innerHTML = `<strong>Backend Message:</strong><br/>${data.message}<br/><br/><small>Version: ${data.version}</small>`;
                        }, 500); // fake delay for UI effect
                    })
                    .catch(err => {
                        document.getElementById('loader').style.display = 'none';
                        const resDiv = document.getElementById('response');
                        resDiv.style.display = 'block';
                        resDiv.innerHTML = `<span style="color:#ff4757">Error fetching API! Is the Backend running?</span>`;
                    });
            }
        </script>
    </body>
    </html>
