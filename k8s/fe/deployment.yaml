apiVersion: apps/v1
kind: Deployment
metadata:
  name: fe
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fe
  template:
    metadata:
      labels:
        app: fe
    spec:
      containers:
      - name: fe
        image: nginx:1.27
        ports:
        - containerPort: 80
