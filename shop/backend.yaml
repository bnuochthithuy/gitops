## ── ConfigMap ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: shop-backend-config
  namespace: shop
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  NODE_ENV: "production"
  PORT: "3000"
---
## ── Deployment ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop-backend
  namespace: shop
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app: shop-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: shop-backend
  template:
    metadata:
      labels:
        app: shop-backend
    spec:
      containers:
        - name: shop-backend
          image: ghcr.io/bnuochthithuy/shop-backend:90c5fd78162f137d9de18ea0cf9cdf96e800f471
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: shop-backend-config
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
## ── Service ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: shop-backend
  namespace: shop
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    app: shop-backend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
