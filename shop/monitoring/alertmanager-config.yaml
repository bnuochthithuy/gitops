apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: shop-email-alerts
  namespace: monitoring
  labels:
    # Label để Alertmanager Operator pickup config này
    alertmanagerConfig: shop
spec:
  # ── Route: chỉ xử lý alert có label team=shop ─────────────────────────────
  route:
    receiver: shop-email
    groupBy: ["alertname", "namespace"]
    groupWait: 30s        # chờ 30s gom alert trước khi gửi
    groupInterval: 5m     # gửi lại nếu vẫn còn alert sau 5 phút
    repeatInterval: 1h    # không spam, chỉ nhắc lại sau 1 giờ
    matchers:
      - name: team
        value: shop
        matchType: "="

  # ── Receivers ────────────────────────────────────────────────────────────
  receivers:
    - name: shop-email
      emailConfigs:
        - to: "thuy.bo26@student.passerellesnumeriques.org"          # ← thay email của bạn
          from: "thuy.bo26@student.passerellesnumeriques.org"         # ← thay email của bạn
          smarthost: "smtp.gmail.com:587"
          authUsername: "YOUR_EMAIL@gmail.com" # ← thay email của bạn
          authPassword:
            # Lấy password từ Secret đã tạo
            name: alertmanager-shop-email
            key: smtp_password
          requireTLS: true
          headers:
            - key: Subject
              value: "[SHOP ALERT] {{ .GroupLabels.alertname }} - {{ .Status | toUpper }}"
          html: |
            <h2>🚨 Shop SLO Alert</h2>
            {{ range .Alerts }}
            <hr>
            <b>Alert:</b> {{ .Labels.alertname }}<br>
            <b>Severity:</b> {{ .Labels.severity }}<br>
            <b>Status:</b> {{ .Status }}<br>
            <b>Summary:</b> {{ .Annotations.summary }}<br>
            <b>Description:</b> {{ .Annotations.description }}<br>
            <b>Started:</b> {{ .StartsAt }}<br>
            {{ end }}
