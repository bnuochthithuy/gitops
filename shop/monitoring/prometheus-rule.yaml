apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: shop-slo
  namespace: monitoring
  labels:
    # Label này để Prometheus Operator pickup rule
    release: kube-prometheus-stack
spec:
  groups:
    # ── 1. Recording rules: tính SLO liên tục ─────────────────────────────
    - name: shop-slo-recording
      interval: 30s
      rules:
        # Tỉ lệ request thành công (non-5xx) trong 5 phút
        - record: shop:http_request_success_rate:5m
          expr: |
            sum(rate(http_requests_total{namespace="shop", status!~"5.."}[5m]))
            /
            sum(rate(http_requests_total{namespace="shop"}[5m]))

        # Error budget còn lại (SLO target 99%)
        # error_budget = 1 - (1 - success_rate) / (1 - 0.99)
        - record: shop:slo_error_budget_remaining
          expr: |
            1 - (
              (1 - shop:http_request_success_rate:5m)
              / (1 - 0.99)
            )

    # ── 2. Alert rules ──────────────────────────────────────────────────────
    - name: shop-slo-alerts
      rules:
        # Alert khi availability tụt dưới 99% trong 5 phút liên tiếp
        - alert: ShopSLOBreach
          expr: |
            sum(rate(http_requests_total{namespace="shop", status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{namespace="shop"}[5m]))
            > 0.01
          for: 5m
          labels:
            severity: critical
            team: shop
          annotations:
            summary: "Shop SLO bị vi phạm"
            description: |
              Error rate hiện tại {{ $value | humanizePercentage }} vượt ngưỡng SLO 1%.
              Availability đang dưới 99%.
            runbook_url: "https://github.com/bnuochthithuy/gitops/blob/main/shop/README.md"

        # Warning sớm khi error budget còn < 50%
        - alert: ShopSLOErrorBudgetLow
          expr: shop:slo_error_budget_remaining < 0.5
          for: 2m
          labels:
            severity: warning
            team: shop
          annotations:
            summary: "Shop error budget tiêu thụ > 50%"
            description: |
              Error budget còn lại {{ $value | humanizePercentage }}.
              Cần kiểm tra ngay để tránh vi phạm SLO.
